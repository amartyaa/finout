# Builds and pushes frontend and backend images to Azure Container Registry
# Then triggers a new revision in Container Apps
name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.ARM_TENANT_ID }}"
            }

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Build and push backend
        run: |
          cd backend
          docker build -t ${{ steps.acr.outputs.login_server }}/finops-backend:latest \
                       -t ${{ steps.acr.outputs.login_server }}/finops-backend:${{ github.sha }} .
          docker push ${{ steps.acr.outputs.login_server }}/finops-backend --all-tags

      - name: Build and push frontend
        run: |
          cd frontend
          docker build -t ${{ steps.acr.outputs.login_server }}/finops-frontend:latest \
                       -t ${{ steps.acr.outputs.login_server }}/finops-frontend:${{ github.sha }} .
          docker push ${{ steps.acr.outputs.login_server }}/finops-frontend --all-tags

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_BACKEND }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/finops-backend:${{ github.sha }}

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_FRONTEND }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/finops-frontend:${{ github.sha }}