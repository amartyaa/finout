# This Yaml Contains the build and push pipeline for the frontend and backend
name: Build and Push
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push frontend
        run: |
          cd frontend
          docker build -t finops-frontend .
          docker tag finops-frontend amartyaa/finops-frontend:latest
          docker push amartyaa/finops-frontend:latest
      - name: Build and push backend
        run: |
          cd backend
          docker build -t finops-backend .
          docker tag finops-backend amartyaa/finops-backend:latest
          docker push amartyaa/finops-backend:latest